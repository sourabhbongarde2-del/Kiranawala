<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Admin – Kirana Basket</title>
<link rel="icon" href="assets/icons/icon-192.png"/>
<meta name="robots" content="noindex,nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/admin.css"/>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:40px;margin-bottom:8px">⚙️</div>
      <div style="font-size:20px;font-weight:900;color:#111">Admin Login</div>
      <div style="font-size:12px;color:#999;margin-top:4px">Kirana Basket Dashboard</div>
    </div>
    <div id="login-store-name" style="text-align:center;font-size:12px;font-weight:700;color:#0c831f;margin-bottom:4px;min-height:16px"></div>
    <div id="login-conn-status" style="text-align:center;font-size:10px;font-weight:700;margin-bottom:14px;min-height:14px"></div>
    <div style="margin-bottom:14px">
      <div style="font-size:11px;font-weight:700;color:#666;margin-bottom:5px">Admin Password</div>
      <input id="adm-pass" type="password" placeholder="••••••••" class="inp" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div id="login-err" style="color:#ff4444;font-size:12px;margin-bottom:12px;min-height:18px;text-align:center;font-weight:600"></div>
    <button id="login-btn" onclick="doLogin()" style="width:100%;background:#0c831f;color:#fff;border:none;border-radius:12px;padding:13px;font-weight:800;font-size:14px;cursor:pointer;font-family:'Poppins',sans-serif">
      Login →
    </button>
    <a href="index.html" style="display:block;text-align:center;margin-top:14px;font-size:12px;color:#aaa;text-decoration:none">
      ← Back to Store
    </a>
    <a href="register.html" style="display:block;text-align:center;margin-top:8px;font-size:11px;color:#aaa;text-decoration:none">
      Naya store register karna hai?
    </a>
    <div style="text-align:center;margin-top:18px;font-size:10px;color:#ccc">
      Developed by <strong style="color:#999">Sourabh Bongarde Software Solutions Pvt Ltd</strong>
    </div>
  </div>
</div>

<!-- ══ ADMIN PANEL ══ -->
<div id="admin-panel" class="adm-page" style="display:none">

  <!-- Header -->
  <div style="background:#0c831f;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:20">
    <div>
      <div style="font-size:17px;font-weight:800;color:#fff">⚙️ Admin Dashboard</div>
      <div id="adm-sub" style="font-size:10px;color:rgba(255,255,255,.8);margin-top:2px">Loading...</div>
    </div>
    <a href="index.html" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:10px;padding:8px 14px;font-weight:700;font-size:12px;text-decoration:none;white-space:nowrap">🏪 Store</a>
  </div>

  <!-- Tabs -->
  <div style="display:flex;background:#fff;border-bottom:2px solid #f0f0f0;flex-shrink:0;position:sticky;top:57px;z-index:10">
    <button class="adm-tab active" data-tab="dash"     onclick="admTab('dash')">    <span class="tab-ic">📊</span><span>Dash</span></button>
    <button class="adm-tab"        data-tab="list"     onclick="admTab('list')">    <span class="tab-ic">📦</span><span>Products</span></button>
    <button class="adm-tab"        data-tab="add"      onclick="admTab('add')">     <span class="tab-ic">➕</span><span>Add</span></button>
    <button class="adm-tab"        data-tab="banners"  onclick="admTab('banners')"> <span class="tab-ic">🖼️</span><span>Banners</span></button>
    <button class="adm-tab"        data-tab="orders"   onclick="admTab('orders')">  <span class="tab-ic">🧾</span><span>Orders</span></button>
    <button class="adm-tab"        data-tab="settings" onclick="admTab('settings')"><span class="tab-ic">⚙️</span><span>Settings</span></button>
  </div>

  <!-- Tab Body -->
  <div id="adm-body" style="padding:14px;overflow-y:auto;flex:1;padding-bottom:30px"></div>

</div>

<div id="toast" class="toast"></div>

<!-- ════════════════════════════
     Firebase SDKs  ← FIXED: Firestore added
════════════════════════════ -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- App scripts -->
<script src="js/core/config.js"></script>
<script src="js/core/Db.js"></script>
<script src="js/admin/admin-state.js"></script>
<script src="js/admin/admin-core.js"></script>
<script src="js/admin/admin-products.js"></script>
<script src="js/admin/admin-banners.js"></script>
<script src="js/admin/admin-orders.js"></script>
<script src="js/admin/admin-settings.js"></script>

<script src="js/admin/admin-login.js"></script>
</body>
  </html>
